name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build DMG & Publish Release
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install xcodegen 2>/dev/null || true
          pip3 install pillow --quiet 2>/dev/null || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild \
            -project Gridly.xcodeproj \
            -scheme GridlyLocal \
            -resolvePackageDependencies

      - name: Build (Release, ad-hoc signed)
        run: |
          # Strip the leading "v" from the tag (v1.3.1 → 1.3.1)
          APP_VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild \
            -project Gridly.xcodeproj \
            -scheme GridlyLocal \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=/tmp/GridlyRelease \
            CODE_SIGN_IDENTITY="-" \
            MARKETING_VERSION="${APP_VERSION}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            build | tail -5
          echo "✓ Build complete — version ${APP_VERSION} (${BUILD_NUMBER})"
          ls /tmp/GridlyRelease/

      - name: Package DMG
        run: |
          VERSION="${GITHUB_REF_NAME}"   # e.g. v1.2.0
          DMG_NAME="Gridly-${VERSION}.dmg"

          # Stage folder
          rm -rf /tmp/GridlyDMG && mkdir /tmp/GridlyDMG
          cp -R /tmp/GridlyRelease/Gridly.app /tmp/GridlyDMG/
          ln -s /Applications /tmp/GridlyDMG/Applications

          # Create compressed DMG directly (avoids UDRW mount/detach which can
          # fail on hosted runners due to sandbox restrictions)
          hdiutil create \
            -volname "Gridly" \
            -srcfolder /tmp/GridlyDMG \
            -ov \
            -format UDZO \
            -imagekey zlib-level=9 \
            "/tmp/${DMG_NAME}"

          ls -lh "/tmp/${DMG_NAME}"
          echo "DMG_PATH=/tmp/${DMG_NAME}" >> $GITHUB_ENV
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES_FILE=/tmp/release_notes.md

          if [ -f CHANGELOG.md ]; then
            # Extract the block for this version (between ## [vX.Y.Z] headings)
            awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
              CHANGELOG.md > "$NOTES_FILE"
          fi

          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release \`${VERSION}\` — see [README](https://github.com/${{ github.repository }}#readme) for full documentation." \
              > "$NOTES_FILE"
          fi

          echo "--- Release notes ---"
          cat "$NOTES_FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Gridly ${{ env.VERSION }}"
          body_path: /tmp/release_notes.md
          files: ${{ env.DMG_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

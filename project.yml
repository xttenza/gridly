name: Gridly
options:
  bundleIdPrefix: com.gridly
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    ENABLE_HARDENED_RUNTIME: YES
    GCC_OPTIMIZATION_LEVEL: s
    SWIFT_OPTIMIZATION_LEVEL: -O
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    MARKETING_VERSION: "1.3.1"
    CURRENT_PROJECT_VERSION: "5"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      GCC_OPTIMIZATION_LEVEL: "0"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

packages:
  MSAL:
    url: https://github.com/AzureAD/microsoft-authentication-library-for-objc
    from: "1.2.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"

targets:

  # ═══════════════════════════════════════════════════════════
  # Framework Modules (each Sources/CSXxx becomes a framework)
  # ═══════════════════════════════════════════════════════════

  CSCore:
    type: framework
    platform: macOS
    sources: [Sources/CSCore]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.cscore
        PRODUCT_NAME: CSCore
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES

  CSCrypto:
    type: framework
    platform: macOS
    sources: [Sources/CSCrypto]
    dependencies:
      - target: CSCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.cscrypto
        PRODUCT_NAME: CSCrypto
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES

  CSAuth:
    type: framework
    platform: macOS
    sources: [Sources/CSAuth]
    dependencies:
      - target: CSCore
      - target: CSCrypto
      - package: MSAL
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.csauth
        PRODUCT_NAME: CSAuth
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES

  CSWorkspace:
    type: framework
    platform: macOS
    sources: [Sources/CSWorkspace]
    dependencies:
      - target: CSCore
      - target: CSCrypto
      - target: CSAudit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.csworkspace
        PRODUCT_NAME: CSWorkspace
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES

  CSPolicy:
    type: framework
    platform: macOS
    sources: [Sources/CSPolicy]
    dependencies:
      - target: CSCore
      - target: CSCrypto
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.cspolicy
        PRODUCT_NAME: CSPolicy
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES

  CSAudit:
    type: framework
    platform: macOS
    sources: [Sources/CSAudit]
    dependencies:
      - target: CSCore
      - target: CSCrypto
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.csaudit
        PRODUCT_NAME: CSAudit
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES

  CSGraph:
    type: framework
    platform: macOS
    sources: [Sources/CSGraph]
    dependencies:
      - target: CSCore
      - target: CSCrypto
      - target: CSAuth
      - target: CSPolicy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.csgraph
        PRODUCT_NAME: CSGraph
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES

  CSUI:
    type: framework
    platform: macOS
    sources: [Sources/CSUI]
    dependencies:
      - target: CSCore
      - target: CSCrypto
      - target: CSAuth
      - target: CSWorkspace
      - target: CSPolicy
      - target: CSGraph
      - target: CSAudit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.csui
        PRODUCT_NAME: CSUI
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES

  # ═══════════════════════════════════════════════════════════
  # Main App
  # ═══════════════════════════════════════════════════════════

  Gridly:
    type: application
    platform: macOS
    sources:
      - App
    resources:
      - App/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.app
        PRODUCT_NAME: Gridly
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Gridly.entitlements
        CODE_SIGN_IDENTITY: "-"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: CSCore
      - target: CSCrypto
      - target: CSAuth
      - target: CSWorkspace
      - target: CSPolicy
      - target: CSGraph
      - target: CSAudit
      - target: CSUI
      - package: MSAL
      - package: GRDB
      - target: GridlyAgent
        embed: false
      - target: GridlyHelper
        embed: false

  # ═══════════════════════════════════════════════════════════
  # LaunchAgent (persistent background process)
  # ═══════════════════════════════════════════════════════════

  GridlyAgent:
    type: tool
    platform: macOS
    sources: [Agent]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.agent
        PRODUCT_NAME: GridlyAgent
        INFOPLIST_FILE: Agent/Info.plist
        CODE_SIGN_ENTITLEMENTS: Agent/Agent.entitlements
        CODE_SIGN_IDENTITY: "-"
        INSTALL_PATH: "$(CONTENTS_FOLDER_PATH)/Library/LaunchAgents"
    dependencies:
      - target: CSCore
      - target: CSCrypto
      - target: CSAuth
      - target: CSWorkspace
      - target: CSPolicy
      - target: CSAudit
      - package: GRDB

  # ═══════════════════════════════════════════════════════════
  # Privileged Helper (SMJobBless)
  # ═══════════════════════════════════════════════════════════

  GridlyHelper:
    type: tool
    platform: macOS
    sources: [Helper]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.helper
        PRODUCT_NAME: GridlyHelper
        INFOPLIST_FILE: Helper/Info.plist
        CODE_SIGN_ENTITLEMENTS: Helper/Helper.entitlements
        CODE_SIGN_IDENTITY: "-"
        INSTALL_PATH: "$(CONTENTS_FOLDER_PATH)/Library/PrivilegedHelperTools"
    dependencies:
      - target: CSCore
      - target: CSCrypto

  # ═══════════════════════════════════════════════════════════
  # iPad App (standalone, no macOS framework dependencies)
  # ═══════════════════════════════════════════════════════════

  GridlyMobile:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - GridlyMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.mobile
        PRODUCT_NAME: Gridly
        INFOPLIST_FILE: GridlyMobile/Info.plist
        CODE_SIGN_IDENTITY: "iPhone Developer"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.9"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

  # ═══════════════════════════════════════════════════════════
  # Network Extension (per-app VPN)
  # ═══════════════════════════════════════════════════════════

  GridlyNE:
    type: app-extension
    platform: macOS
    sources: [NetworkExtension]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.networkextension
        PRODUCT_NAME: GridlyNE
        INFOPLIST_FILE: NetworkExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: NetworkExtension/NetworkExtension.entitlements
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - target: CSCore
      - target: CSCrypto
      - target: CSPolicy

  # ═══════════════════════════════════════════════════════════
  # Unit Test Targets
  # ═══════════════════════════════════════════════════════════

  CSCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/CSCoreTests]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.tests.cscore
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CSCore

  CSCryptoTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/CSCryptoTests]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.tests.cscrypto
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CSCore
      - target: CSCrypto

  CSPolicyTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/CSPolicyTests]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.tests.cspolicy
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CSCore
      - target: CSCrypto
      - target: CSPolicy

schemes:
  Gridly:
    build:
      targets:
        Gridly: all
        GridlyAgent: all
        GridlyHelper: all
        GridlyNE: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CSCoreTests
        - CSCryptoTests
        - CSPolicyTests
    archive:
      config: Release

  # iPad app scheme
  GridlyMobile:
    build:
      targets:
        GridlyMobile: all
    run:
      config: Debug
    archive:
      config: Release

  # Local/personal build — excludes Network Extension (requires Apple paid entitlement)
  GridlyLocal:
    build:
      targets:
        Gridly: all
        GridlyAgent: all
        GridlyHelper: all
    run:
      config: Release
    archive:
      config: Release
